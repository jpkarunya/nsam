workflows:
  android-debug:
    name: NetGuard Android Debug
    max_build_duration: 60
    environment:
      flutter: 3.41.4
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
