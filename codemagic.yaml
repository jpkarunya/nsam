workflows:
  android-debug:
    name: NetGuard Android Debug
    max_build_duration: 60
    environment:
      flutter: 3.41.4
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: |
          cd android
          ./gradlew clean
          cd ..
          flutter build apk --debug --no-shrink
    artifacts:
      - build/**/outputs/**/*.apk
      - build/**/outputs/**/*.aab
