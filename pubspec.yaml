name: netguard
description: NetGuard — AI-Based Network Threat Detection System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Networking
  http: ^1.2.1

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^1.1.1

  # UI & Fonts
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # Storage (for settings persistence)
  shared_preferences: ^2.2.3

  # Utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
